# =============================================================================
#  04-recyclarr.yml — Recyclarr Configuration
#
#  Defines quality profiles and custom formats for Radarr and Sonarr
#  using TRaSH Guides recommendations.
#
#  Secrets are read from environment variables — the API keys themselves
#  are NEVER stored in this file.
#
#  Usage (after stack is running and keys are populated in .env):
#    docker exec -it recyclarr recyclarr sync
#
#  Documentation:
#    https://recyclarr.dev/wiki/yaml/config-reference/
# =============================================================================

radarr:
  movies:
    base_url: http://radarr:7878
    # API key is injected from environment — set RADARR_API_KEY in .env
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - name: HD Balanced
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_filter:
          include:
            - WEBDL-1080p
            - WEBRip-1080p
            - Bluray-1080p
            - HDTV-1080p
            - WEBDL-720p

    custom_formats:
      # ── Audio ──────────────────────────────────────────────────────────────
      - trash_ids:
          - 4232a509ce60c4e208d13825b7c06264  # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95  # DTS X
          - 1af239278386be2919e1bcee0bde047e  # DTS-HD MA
          - 3cafb66171b47f226146a0770576870f  # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd  # DTS-HD HRA
          - a570d4a0e56a2874b64e5bfa55202a1b  # FLAC
          - e7c2fcae07cbada050a0af3357491d7b  # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db  # DTS-ES
          - 185f1dd7264c4562b9022d963ac37424  # DD+
          - f9f847ac70a0af62ea4a08280b859636  # DTS
          - 240770601cc226190c367ef59aba7463  # AAC
          - c2998bd0d90ed5621d8df281e839436e  # Dolby Digital
        assign_scores_to:
          - name: HD Balanced

      # ── Video ──────────────────────────────────────────────────────────────
      - trash_ids:
          - e23edd2482476e595fb990b12e7c609c  # DV HDR10
          - 58d6a88f13e2db7f5059c41047876f00  # DV
          - 55d53828b9d81cbe20b02efd00aa0efd  # DV HLG
          - a3e19f8f627608af0211acd02bf89735  # DV SDR
          - e61e28db84184b228c4c5d01ce6d1ede  # HDR10+
          - 2a4d9069cc1fe3242ff9bdaebed239bb  # HDR10
          - dfb86d5941bc9075d6af23b09c2aeecd  # HDR
          - 9364dd386c3b40478cba570866760fd6  # HDR (undefined)
        assign_scores_to:
          - name: HD Balanced

      # ── Unwanted ───────────────────────────────────────────────────────────
      - trash_ids:
          - ed38b889b31be83fda192888e2286d83  # BR-DISK
          - 90a6f9a284dff5103f6346090e6280c8  # LQ
          - e204b80c87be9497a8a6760859f0dea5  # x265 (no HDR/DV)
          - dc98083864ea246d05a0169a7e658436  # x265 (HD)
          - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
          - bef99584217af744ae6f31e732a2f4b1  # Extras
        assign_scores_to:
          - name: HD Balanced
            score: -10000

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: HD Balanced
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 10000
        min_format_score: 0
        quality_filter:
          include:
            - WEBDL-1080p
            - WEBRip-1080p
            - Bluray-1080p
            - HDTV-1080p
            - WEBDL-720p

    custom_formats:
      # ── Unwanted ───────────────────────────────────────────────────────────
      - trash_ids:
          - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
          - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
          - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
          - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
          - 82d40da2bc6923f41e56d5a2b6c09c54  # No-RlsGroup
        assign_scores_to:
          - name: HD Balanced
            score: -10000

      # ── Streaming Services ─────────────────────────────────────────────────
      - trash_ids:
          - d660701077794679fd59e8bdf4ce3a29  # AMZN
          - f67c9ca88f463a48346062e1ce71994e  # ATVP
          - 77a7b25585c18af08f60b1547bb9776a  # DCU
          - 36b72f59f4ea20aad9316f475f2d9fbb  # DSNP
          - 89358767a60cc28783cdc3d0be9388a4  # NF
          - a880d6abc21e7c16884f3ae393f84179  # HMAX
          - f6cce30f1733d5c8194222a7507909bb  # PCOK
          - c9fd353f8f5f1baf56dc601c4cb29920  # PHUB (Paramount+)
          - e36a0ba1bc902b26ee40818a1d59b8bd  # STAN
        assign_scores_to:
          - name: HD Balanced
